name: Backend CI

on:
  push:
    branches: [main, "release/**"]
    paths: ["backend/**"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff check app/ --select E,F,W

  test-api:
    name: pytest API Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cold_email_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx pytest-cov factory-boy faker
      - name: Run Alembic migrations on test DB
        run: |
          TEST_DATABASE_URL=postgresql://user:password@localhost:5432/cold_email_test \
          alembic upgrade head
        env:
          SECRET_KEY: test-secret
      - run: |
          pytest tests/api -v \
            --junitxml=results.xml \
            --cov=app --cov-report=xml
        env:
          TEST_DATABASE_URL: postgresql://user:password@localhost:5432/cold_email_test
          REDIS_URL: redis://localhost:6379/1
          SECRET_KEY: test-secret-key
          OPENAI_API_KEY: test-disabled
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: backend/results.xml
          retention-days: 14
