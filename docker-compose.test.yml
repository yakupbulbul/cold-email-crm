version: "3.9"

# Lightweight test environment — postgres + redis only (no Mailcow/Mailpit)
# Used for fast pytest unit/API runs in CI
# Usage: docker compose -f docker-compose.test.yml up -d

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: crm_postgres_test
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cold_email_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cold_email_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: crm_redis_test
    ports:
      - "6380:6379"

volumes:
  postgres_test_data:
