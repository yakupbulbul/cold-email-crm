version: '3.8'

services:
  frontend:
    build: 
      context: ./frontend
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  api:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    restart: always
    environment:
      - POSTGRES_URL=postgresql://user:password@db:5432/cold_email_crm
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - db
      - redis

  worker:
    build: 
      context: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    restart: always
    environment:
      - POSTGRES_URL=postgresql://user:password@db:5432/cold_email_crm
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - db
      - redis

  scheduler:
    build: 
      context: ./backend
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: always
    environment:
      - POSTGRES_URL=postgresql://user:password@db:5432/cold_email_crm
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cold_email_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
