services:
  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    profiles: ["full"]
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      BACKEND_URL: http://backend:8000
      POSTGRES_URL: ${POSTGRES_URL_DOCKER:-postgresql://user:password@postgres:5432/cold_email_crm}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
    ports:
      - "${BACKEND_PORT:-8050}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    profiles: ["full"]
    build:
      context: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      POSTGRES_URL: ${POSTGRES_URL_DOCKER:-postgresql://user:password@postgres:5432/cold_email_crm}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    profiles: ["full"]
    build:
      context: ./backend
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      POSTGRES_URL: ${POSTGRES_URL_DOCKER:-postgresql://user:password@postgres:5432/cold_email_crm}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cold_email_crm
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cold_email_crm"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  postgres_data:
